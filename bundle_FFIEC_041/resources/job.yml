resources:
  jobs:
    ffiec_041_pipeline:
      name: "FFIEC_041 Regulatory Pipeline"
      queue:
        enabled: true
      max_concurrent_runs: 1
      tags:
        report: "FFIEC_041"
        catalog: "bfsi_regulatory_catalog"
      environments:
        - environment_key: serverless
          spec:
            client: "1"
      tasks:
    - task_key: bronze_gl_balances
      description: "[bronze] raw_sources.gl_balances"
      environment_key: serverless
      notebook_task:
        notebook_path: ./src/ingest/gl_balances.py
        base_parameters:
          catalog: "${{var.catalog}}"
          report_date: "${{var.report_date}}"
          table_name: "gl_balances"
          schema_name: "raw_sources"

    - task_key: bronze_loan_positions
      description: "[bronze] raw_sources.loan_positions"
      environment_key: serverless
      notebook_task:
        notebook_path: ./src/ingest/loan_positions.py
        base_parameters:
          catalog: "${{var.catalog}}"
          report_date: "${{var.report_date}}"
          table_name: "loan_positions"
          schema_name: "raw_sources"

    - task_key: bronze_securities_positions
      description: "[bronze] raw_sources.securities_positions"
      environment_key: serverless
      notebook_task:
        notebook_path: ./src/ingest/securities_positions.py
        base_parameters:
          catalog: "${{var.catalog}}"
          report_date: "${{var.report_date}}"
          table_name: "securities_positions"
          schema_name: "raw_sources"

    - task_key: bronze_deposit_accounts
      description: "[bronze] raw_sources.deposit_accounts"
      environment_key: serverless
      notebook_task:
        notebook_path: ./src/ingest/deposit_accounts.py
        base_parameters:
          catalog: "${{var.catalog}}"
          report_date: "${{var.report_date}}"
          table_name: "deposit_accounts"
          schema_name: "raw_sources"

    - task_key: bronze_allowance_positions
      description: "[bronze] raw_sources.allowance_positions"
      environment_key: serverless
      notebook_task:
        notebook_path: ./src/ingest/allowance_positions.py
        base_parameters:
          catalog: "${{var.catalog}}"
          report_date: "${{var.report_date}}"
          table_name: "allowance_positions"
          schema_name: "raw_sources"

    - task_key: bronze_derivative_positions
      description: "[bronze] raw_sources.derivative_positions"
      environment_key: serverless
      notebook_task:
        notebook_path: ./src/ingest/derivative_positions.py
        base_parameters:
          catalog: "${{var.catalog}}"
          report_date: "${{var.report_date}}"
          table_name: "derivative_positions"
          schema_name: "raw_sources"

    - task_key: bronze_capital_positions
      description: "[bronze] raw_sources.capital_positions"
      environment_key: serverless
      notebook_task:
        notebook_path: ./src/ingest/capital_positions.py
        base_parameters:
          catalog: "${{var.catalog}}"
          report_date: "${{var.report_date}}"
          table_name: "capital_positions"
          schema_name: "raw_sources"

    - task_key: silver_fact_gl_positions
      description: "[silver] conformed.fact_gl_positions"
      environment_key: serverless
      depends_on:
        - task_key: bronze_gl_balances
      notebook_task:
        notebook_path: ./src/transform/fact_gl_positions.py
        base_parameters:
          catalog: "${{var.catalog}}"
          report_date: "${{var.report_date}}"
          table_name: "fact_gl_positions"
          schema_name: "conformed"

    - task_key: silver_fact_loans_conformed
      description: "[silver] conformed.fact_loans_conformed"
      environment_key: serverless
      depends_on:
        - task_key: bronze_loan_positions
        - task_key: bronze_allowance_positions
      notebook_task:
        notebook_path: ./src/transform/fact_loans_conformed.py
        base_parameters:
          catalog: "${{var.catalog}}"
          report_date: "${{var.report_date}}"
          table_name: "fact_loans_conformed"
          schema_name: "conformed"

    - task_key: gold_schedule_ri_b
      description: "[gold] ffiec041_schedules.schedule_ri_b"
      environment_key: serverless
      depends_on:
        - task_key: bronze_allowance_positions
      notebook_task:
        notebook_path: ./src/transform/schedule_ri_b.py
        base_parameters:
          catalog: "${{var.catalog}}"
          report_date: "${{var.report_date}}"
          table_name: "schedule_ri_b"
          schema_name: "ffiec041_schedules"

    - task_key: gold_schedule_rc_r
      description: "[gold] ffiec041_schedules.schedule_rc_r"
      environment_key: serverless
      depends_on:
        - task_key: bronze_capital_positions
      notebook_task:
        notebook_path: ./src/transform/schedule_rc_r.py
        base_parameters:
          catalog: "${{var.catalog}}"
          report_date: "${{var.report_date}}"
          table_name: "schedule_rc_r"
          schema_name: "ffiec041_schedules"

    - task_key: gold_schedule_rc
      description: "[gold] ffiec041_schedules.schedule_rc"
      environment_key: serverless
      depends_on:
        - task_key: silver_fact_gl_positions
      notebook_task:
        notebook_path: ./src/transform/schedule_rc.py
        base_parameters:
          catalog: "${{var.catalog}}"
          report_date: "${{var.report_date}}"
          table_name: "schedule_rc"
          schema_name: "ffiec041_schedules"

    - task_key: gold_schedule_ri
      description: "[gold] ffiec041_schedules.schedule_ri"
      environment_key: serverless
      depends_on:
        - task_key: silver_fact_gl_positions
      notebook_task:
        notebook_path: ./src/transform/schedule_ri.py
        base_parameters:
          catalog: "${{var.catalog}}"
          report_date: "${{var.report_date}}"
          table_name: "schedule_ri"
          schema_name: "ffiec041_schedules"

    - task_key: gold_schedule_rc_c
      description: "[gold] ffiec041_schedules.schedule_rc_c"
      environment_key: serverless
      depends_on:
        - task_key: silver_fact_loans_conformed
      notebook_task:
        notebook_path: ./src/transform/schedule_rc_c.py
        base_parameters:
          catalog: "${{var.catalog}}"
          report_date: "${{var.report_date}}"
          table_name: "schedule_rc_c"
          schema_name: "ffiec041_schedules"

    - task_key: gold_schedule_rc_n
      description: "[gold] ffiec041_schedules.schedule_rc_n"
      environment_key: serverless
      depends_on:
        - task_key: silver_fact_loans_conformed
      notebook_task:
        notebook_path: ./src/transform/schedule_rc_n.py
        base_parameters:
          catalog: "${{var.catalog}}"
          report_date: "${{var.report_date}}"
          table_name: "schedule_rc_n"
          schema_name: "ffiec041_schedules"

    - task_key: gold_cdr_submission_package
      description: "[gold] ffiec041_submission.cdr_submission_package"
      environment_key: serverless
      depends_on:
        - task_key: gold_schedule_rc
        - task_key: gold_schedule_ri
        - task_key: gold_schedule_rc_c
        - task_key: gold_schedule_rc_r
        - task_key: gold_schedule_rc_n
        - task_key: gold_schedule_ri_b
      notebook_task:
        notebook_path: ./src/transform/cdr_submission_package.py
        base_parameters:
          catalog: "${{var.catalog}}"
          report_date: "${{var.report_date}}"
          table_name: "cdr_submission_package"
          schema_name: "ffiec041_submission"
